name: Release content update

# Builds, signs, and publishes a CONTENT update (frontend + backend + migrations)
# to the static feed — no new app binary. Trigger either way:
#   git tag content-v1.0.3 && git push origin content-v1.0.3
#   …or run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - 'content-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Content version (e.g. 1.0.3); defaults to package.json'
        required: false

permissions:
  contents: write # publish to the content-latest GitHub Release

jobs:
  publish-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Derive the content version from a content-v* tag, the manual input, or
      # package.json (in that order).
      - name: Resolve content version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == content-v* ]]; then
            echo "version=${GITHUB_REF_NAME#content-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (shared → api → web)
        run: yarn build

      - name: Build + pack + sign + publish content
        env:
          CONTENT_VERSION: ${{ steps.ver.outputs.version }}
          # The ed25519 PRIVATE key (PEM) that signs the manifest. Store it as a
          # repo secret; it must match the public key bundled into the shipped shell.
          CONTENT_PRIVATE_KEY_PEM: ${{ secrets.CONTENT_PRIVATE_KEY_PEM }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$CONTENT_PRIVATE_KEY_PEM" ]; then
            echo "::error::CONTENT_PRIVATE_KEY_PEM secret is not set — cannot sign the update."
            exit 1
          fi
          yarn content:build
          yarn content:pack
          yarn content:publish
